<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Futbol AI Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --main-green: #4db300;
            --dark-bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --yellow: #ffcc00;
            --telegram: #0088cc;
            --red: #ff4d4d;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh;
        }

        .header {
            background: linear-gradient(to bottom, #2a5a00, #1a3a00);
            padding: 15px; text-align: center; font-weight: bold; border-bottom: 2px solid var(--main-green);
        }

        .content {
            flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 110px;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a3a00 100%);
        }

        /* PROFIL YENI DIZAYN */
        .profile-wrapper { display: flex; flex-direction: column; gap: 20px; }
        
        .user-header-card {
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border: 1px solid rgba(77, 179, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .profile-img-container {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 3px solid var(--main-green);
            padding: 3px;
            background: #222;
        }

        .profile-img-container img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .user-titles h3 { margin: 0; font-size: 20px; color: white; }
        .user-titles span { font-size: 13px; color: var(--yellow); font-weight: 500; }

        .stats-container { display: grid; gap: 10px; }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-info { display: flex; align-items: center; gap: 12px; font-size: 15px; font-weight: 500; }
        .stat-num { font-size: 18px; font-weight: bold; }
        .num-total { color: white; }
        .num-win { color: var(--main-green); }
        .num-lose { color: var(--red); }

        /* REYTINQ DIZAYN */
        .user-item {
            background: rgba(26, 26, 26, 0.9);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .score { color: var(--main-green); font-weight: bold; }

        .match-card {
            background: rgba(26, 26, 26, 0.9);
            border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 12px;
        }

        .selected-card { border: 2px solid var(--main-green) !important; background: rgba(77, 179, 0, 0.15) !important; }

        .ai-stats-row { display: flex; justify-content: space-between; margin-top: 10px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px; font-size: 13px; }

        .coupon-match { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; }

        .score-box { display: flex; align-items: center; gap: 5px; background: #222; padding: 5px 10px; border-radius: 8px; border: 1px solid #444; }

        .score-input { background: transparent; border: none; color: var(--main-green); font-size: 20px; font-weight: bold; width: 25px; text-align: center; outline: none; }

        .sticky-footer {
            position: sticky;
            bottom: -15px;
            background: var(--dark-bg);
            padding: 15px 0;
            margin-top: 10px;
            border-top: 1px solid #333;
            z-index: 99;
        }

        .tab-bar { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid var(--main-green); z-index: 100; }
        .tab-item { text-align: center; font-size: 12px; color: #888; cursor: pointer; flex: 1; }
        .tab-item.active { color: var(--main-green); font-weight: bold; }
        .tab-icon { font-size: 24px; display: block; margin-bottom: 4px; }

        .hidden { display: none; }
        .status-win { color: var(--main-green); font-weight: bold; }
        .status-lose { color: var(--red); font-weight: bold; }
        .status-pending { color: var(--yellow); font-weight: bold; }

        .coupon-footer { display: flex; gap: 10px; margin-top: 10px; }
        .btn-action { flex: 1; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; }
        .btn-share { background: var(--telegram); }
        .btn-check { background: var(--yellow); color: black; }
        .league-badge { background: var(--main-green); color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-bottom: 5px; display: inline-block; }
    </style>
</head>
<body>

<div class="header" id="page-title">5 Günlük Analizlər</div>

<div class="content">
    <div id="page-oyunlar">
        <div id="ai-match-list"></div>
    </div>

    <div id="page-kupon" class="hidden">
        <div style="text-align:center; font-size:12px; color:var(--yellow); margin-bottom:10px;">Seçilən: <span id="selected-count">0</span>/5 (Min: 2)</div>
        <div id="selection-list"></div>
        <div class="sticky-footer">
            <button onclick="confirmCoupon()" style="background: linear-gradient(to bottom, var(--main-green), #1a3a00); border:none; color:white; padding:15px; width:100%; border-radius:10px; font-weight:bold; cursor:pointer;">Kuponu Təsdiqlə</button>
        </div>
    </div>

    <div id="page-reytinq" class="hidden">
        <div id="reytinq-list"><p style="text-align:center; color:#888;">📊 Reytinq Yüklenir...</p></div>
    </div>

    <div id="page-bildiris" class="hidden">
        <div id="my-coupons-list"></div>
    </div>

    <div id="page-profil" class="hidden">
        <div class="profile-wrapper">
            <div class="user-header-card">
                <div class="profile-img-container">
                    <img id="user-photo" src="https://via.placeholder.com/100/222222/FFFFFF?text=👤" alt="User">
                </div>
                <div class="user-titles">
                    <h3 id="user-name">İstifadəçi</h3>
                    <span>🏆 Top AI Analitiki</span>
                </div>
            </div>

            <div class="stats-container">
                <div class="stat-box">
                    <div class="stat-info">🎫 Toplam Kupon</div>
                    <div class="stat-num num-total" id="stat-total">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-info">🏆 Qalib Kuponlar</div>
                    <div class="stat-num num-win" id="stat-win">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-info">❌ Uduzan Kuponlar</div>
                    <div class="stat-num num-lose" id="stat-lose">0</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="tab-bar">
    <div class="tab-item active" id="tab-oyunlar" onclick="showPage('oyunlar', '5 Günlük Analizlər')"><span class="tab-icon">📅</span>Oyunlar</div>
    <div class="tab-item" id="tab-kupon" onclick="showPage('kupon', 'Kupon Yarat')"><span class="tab-icon">🏆</span>Kupon</div>
    <div class="tab-item" id="tab-reytinq" onclick="showPage('reytinq', 'Reytinq')"><span class="tab-icon">📊</span>Reytinq</div>
    <div class="tab-item" id="tab-bildiris" onclick="showPage('bildiris', 'Kuponlar')"><span class="tab-icon">🔔</span>Kuponlar</div>
    <div class="tab-item" id="tab-profil" onclick="showPage('profil', 'Profil')"><span class="tab-icon">👤</span>Profil</div>
</div>

<script>
// Supabase Ayarları - DÜZƏLDİLDİ
const SUPABASE_URL = 'https://onhmllyobgeotujyhpqh.supabase.co';
const SUPABASE_KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uaG1sbHlvYmdlb3R1anlocHFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzkxODgsImV4cCI6MjA4ODgxNTE4OH0.2ahSM711ApFdaedy7_K8VcGHpCm8vniBnI3_vu3eu7M';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const API_KEY = "d99fac0e9b3c4c6a9ec4615c7911908f";
const tg = window.Telegram.WebApp;
tg.expand();

let selectedGames = [];
let myCoupons = [];
let currentUserData = { t:0, w:0, l:0, points: 0 };
const leagueOrder = [2001, 2014, 2015, 2019, 2002, 2003, 2017]; 

function cleanName(name) {
    return name.replace(/\b(FC|CF|SSC|AFC|AS|RCD|RC|OSC|RB|SLB|UD|CD|AZ)\b/gi, '').trim();
}

async function initUser() {
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        const user = tg.initDataUnsafe.user;
        const tgId = user.id.toString();
        const firstName = user.first_name;

        document.getElementById('user-name').innerText = firstName + (user.last_name ? " " + user.last_name : "");
        if(user.photo_url) document.getElementById('user-photo').src = user.photo_url;

        let { data, error } = await supabaseClient.from('users').select('*').eq('telegram_id', tgId).single();

        if (error || !data) {
            const { data: newUser } = await supabaseClient.from('users').insert([
                { telegram_id: tgId, first_name: firstName, points: 0, wins: 0, losses: 0 }
            ]).select().single();
            currentUserData = { t: 0, w: 0, l: 0, points: 0 };
        } else {
            currentUserData = { t: data.wins + data.losses, w: data.wins, l: data.losses, points: data.points };
        }
        updateStats();
    }
}

function updateStats() {
    document.getElementById('stat-total').innerText = currentUserData.t;
    document.getElementById('stat-win').innerText = currentUserData.w;
    document.getElementById('stat-lose').innerText = currentUserData.l;
}

async function updateLeaderboard() {
    const listContainer = document.getElementById('reytinq-list');
    listContainer.innerHTML = "<p style='text-align:center;'>📊 Yüklənir...</p>";

    const { data, error } = await supabaseClient
        .from('users')
        .select('first_name, points')
        .order('points', { ascending: false })
        .limit(10);

    if (data) {
        listContainer.innerHTML = "";
        data.forEach((user, index) => {
            listContainer.innerHTML += `
                <div class="user-item">
                    <span>${index + 1}. ${user.first_name}</span>
                    <span class="score">${user.points} Xal</span>
                </div>`;
        });
    }
}

async function getMatches() {
    const list = document.getElementById('ai-match-list');
    const sList = document.getElementById('selection-list');
    list.innerHTML = "<p style='text-align:center;'>Trend oyunlar gətirilir...</p>";

    const dateFrom = new Date().toISOString().split('T')[0];
    const dateTo = new Date(Date.now() + 5 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
    const targetUrl = `https://api.football-data.org/v4/matches?dateFrom=${dateFrom}&dateTo=${dateTo}`;
    
    try {
        const response = await fetch("https://corsproxy.io/?" + encodeURIComponent(targetUrl), {
            headers: { 'X-Auth-Token': API_KEY }
        });
        const result = await response.json();
        const now = new Date();
        let matches = (result.matches || []).filter(m => new Date(m.utcDate) > now);

        matches.sort((a, b) => {
            let indexA = leagueOrder.indexOf(a.competition.id);
            let indexB = leagueOrder.indexOf(b.competition.id);
            return (indexA === -1 ? 999 : indexA) - (indexB === -1 ? 999 : indexB);
        });

        const top20 = matches.slice(0, 20);
        list.innerHTML = ""; sList.innerHTML = "";
        
        top20.forEach(g => {
            const d = new Date(g.utcDate);
            const dateStr = d.toLocaleDateString('az-AZ', { day: '2-digit', month: '2-digit' });
            const timeStr = d.toLocaleTimeString('az-AZ', { hour: '2-digit', minute: '2-digit' });
            const winProb = Math.floor(Math.random() * 20 + 45); 

            const homeName = cleanName(g.homeTeam.name);
            const awayName = cleanName(g.awayTeam.name);
            
            list.innerHTML += `
                <div class="match-card">
                    <div class="league-badge">${g.competition.name}</div>
                    <div style="text-align:center;">
                        <small style="color:var(--yellow)">${dateStr} | ${timeStr}</small><br>
                        <strong>${homeName} - ${awayName}</strong>
                    </div>
                    <div class="ai-stats-row">
                        <span>1: %${winProb}</span><span>X: %25</span><span>2: %${75-winProb}</span>
                    </div>
                </div>`;

            sList.innerHTML += `
                <div class="match-card coupon-match" id="card-${g.id}" onclick="selectGame('${g.id}')">
                    <div style="flex:1;"><strong style="font-size:14px;">${homeName} - ${awayName}</strong></div>
                    <div class="score-box" onclick="event.stopPropagation()">
                        <input type="tel" class="score-input" id="score-h-${g.id}" value="0" maxlength="1" oninput="autoSelect('${g.id}')">
                        <span style="color:#666">-</span>
                        <input type="tel" class="score-input" id="score-a-${g.id}" value="0" maxlength="1" oninput="autoSelect('${g.id}')">
                    </div>
                </div>`;
        });
    } catch (err) { list.innerHTML = "Xəta baş verdi."; }
}

function autoSelect(id) {
    if(!selectedGames.find(x => x.id === id)) {
        const card = document.getElementById('card-'+id);
        selectedGames.push({id});
        card.classList.add('selected-card');
        document.getElementById('selected-count').innerText = selectedGames.length;
    }
}

function selectGame(id) {
    const card = document.getElementById('card-'+id);
    const index = selectedGames.findIndex(x => x.id === id);
    if(index > -1) {
        selectedGames.splice(index, 1);
        card.classList.remove('selected-card');
    } else if(selectedGames.length < 5) {
        selectedGames.push({id});
        card.classList.add('selected-card');
    }
    document.getElementById('selected-count').innerText = selectedGames.length;
}

function confirmCoupon() {
    if(selectedGames.length < 2) return alert("Min: 2 oyun!");
    const finalGames = selectedGames.map(sg => {
        const card = document.getElementById(`card-${sg.id}`);
        const names = card.querySelector('strong').innerText.split(' - ');
        return {
            h: names[0],
            a: names[1],
            predictedScore: document.getElementById(`score-h-${sg.id}`).value + "-" + document.getElementById(`score-a-${sg.id}`).value,
            gameStatus: 'pending'
        };
    });
    
    myCoupons.unshift({ id: Date.now(), date: new Date().toLocaleString(), games: finalGames, status: 'pending' });
    
    document.querySelectorAll('.score-input').forEach(input => input.value = "0");
    document.querySelectorAll('.selected-card').forEach(card => card.classList.remove('selected-card'));
    
    alert("Kupon yaradıldı! ✅");
    selectedGames = [];
    document.getElementById('selected-count').innerText = "0";
    showPage('bildiris', 'Kuponlar');
}

async function checkCoupon(id) {
    const coupon = myCoupons.find(c => c.id === id);
    if(coupon.status === 'pending') {
        const isWin = Math.random() > 0.5;
        coupon.status = isWin ? 'win' : 'lose';
        
        const tgId = tg.initDataUnsafe.user.id.toString();
        
        if(isWin) {
            currentUserData.w++;
            currentUserData.points += 10;
            await supabaseClient.from('users').update({ 
                wins: currentUserData.w, 
                points: currentUserData.points 
            }).eq('telegram_id', tgId);
        } else {
            currentUserData.l++;
            await supabaseClient.from('users').update({ 
                losses: currentUserData.l 
            }).eq('telegram_id', tgId);
        }
        currentUserData.t = currentUserData.w + currentUserData.l;
    }
    updateStats();
    renderMyCoupons();
}

function shareCoupon(id) {
    const coupon = myCoupons.find(c => c.id === id);
    if(!coupon) return;

    let statusEmoji = coupon.status === 'win' ? '🏆 QAZANDI' : (coupon.status === 'lose' ? '❌ UDUZDU' : '⏳ GÖZLƏNİLİR');
    let text = `🔥 Mənim Futbol AI Kuponum!\n\n`;
    text += `📊 Status: ${statusEmoji}\n`;
    
    coupon.games.forEach(g => {
        text += `⚽ ${g.h} - ${g.a} (${g.predictedScore})\n`;
    });

    text += `\n🤖 Sən də öz AI kuponunu yarat və qazan!\n`;
    text += `👇 Bota daxil ol:\nhttps://t.me/Zehinx_bot`; 

    const shareUrl = `https://t.me/share/url?url=${encodeURIComponent(text)}`;
    tg.openTelegramLink(shareUrl);
}

function renderMyCoupons() {
    const container = document.getElementById('my-coupons-list');
    container.innerHTML = myCoupons.length ? "" : "<p style='text-align:center;'>Hələ kupon yoxdur.</p>";
    myCoupons.forEach(c => {
        let gamesHtml = c.games.map(g => `<div style="font-size:13px; margin:5px 0;">⏳ ${g.h} - ${g.a} (${g.predictedScore})</div>`).join('');
        container.innerHTML += `
            <div class="match-card" style="border-left: 5px solid ${c.status === 'win' ? 'var(--main-green)' : (c.status === 'lose' ? 'var(--red)' : 'var(--yellow)')}">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <small>${c.date}</small>
                    <span class="status-${c.status}">${c.status.toUpperCase()}</span>
                </div>
                ${gamesHtml}
                <div class="coupon-footer">
                    <button class="btn-action btn-share" onclick="shareCoupon(${c.id})">Paylaş 📩</button>
                    <button class="btn-action btn-check" onclick="checkCoupon(${c.id})">Yoxla 🔍</button>
                </div>
            </div>`;
    });
}

function showPage(id, title) {
    document.querySelectorAll('.content > div').forEach(p => p.classList.add('hidden'));
    document.getElementById('page-'+id).classList.remove('hidden');
    document.getElementById('page-title').innerText = title;
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    
    if(id === 'bildiris') renderMyCoupons();
    if(id === 'reytinq') updateLeaderboard();
}

initUser();
getMatches();
</script>
</body>
</html>
